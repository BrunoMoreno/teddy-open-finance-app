name: frontend

on:
  push:
    paths:
      - 'front-end/**'
      - 'package.json'
      - 'nx.json'
      - 'tsconfig.base.json'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'front-end/**'
      - 'package.json'
      - 'nx.json'
      - 'tsconfig.base.json'
      - '.github/workflows/frontend.yml'

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run nx -- run front-end:lint
      - run: npm run nx -- run front-end:test
      - run: npm run nx -- run front-end:build

