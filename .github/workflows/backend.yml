name: backend

on:
  push:
    paths:
      - 'back-end/**'
      - 'package.json'
      - 'nx.json'
      - 'tsconfig.base.json'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'back-end/**'
      - 'package.json'
      - 'nx.json'
      - 'tsconfig.base.json'
      - '.github/workflows/backend.yml'

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run nx -- run back-end:lint
      - run: npm run nx -- run back-end:test -- --runInBand
      - run: npm run nx -- run back-end:build

