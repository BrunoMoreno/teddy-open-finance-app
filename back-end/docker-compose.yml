services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teddy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teddy_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - teddy-backend-postgres:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: back-end/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      DB_HOST: db
    ports:
      - "3000:3000"

volumes:
  teddy-backend-postgres:

